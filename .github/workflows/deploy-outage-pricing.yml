name: Build and Deploy outage-pricing to Cloud Run

# Triggered on pushes to deploy/outage-pricing. Builds the Next.js dashboard (web/)
# and deploys it as a NO-TRAFFIC tagged revision ("next") — the live URL keeps serving
# the current revision until traffic is flipped via promote-outage-pricing.yml. Preview-
# before-promote (docs/plan/dashboard_redesign/deployment.md). main stays non-deploying.

on:
  push:
    branches: [deploy/outage-pricing]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      SERVICE: outage-pricing
      REGION: us-central1
      AR_HOST: us-central1-docker.pkg.dev
      AR_PROJECT: modeling-nonprod-svc-db5x
      AR_REPO: infrasuremodelingdocker
      APP_PATH: web
      BASE_PATH: /dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'modeling-nonprod-svc-db5x'
          workload_identity_provider: 'projects/952205173464/locations/global/workloadIdentityPools/infrasure-gh-actions-pool/providers/github-repo-provider'
          service_account: 'gh-actions-deploy@modeling-nonprod-svc-db5x.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      - name: Build and push image (Next.js · Node)
        # builder-jammy-FULL: the Node buildpack needs libatomic (the -base gotcha).
        # BP_NODE_RUN_SCRIPTS=build runs `next build`; NEXT_PUBLIC_BASE_PATH bakes the
        # /dashboard basePath at build so the public URL stays …run.app/dashboard/.
        # Launch comes from web/Procfile (`web: npm run start` → next start, binds $PORT).
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          pack build "$IMAGE" \
            --builder paketobuildpacks/builder-jammy-full \
            --path ${{ env.APP_PATH }} \
            --env BP_NODE_RUN_SCRIPTS=build \
            --env NEXT_PUBLIC_BASE_PATH=${{ env.BASE_PATH }} \
            --publish

      - name: Deploy NO-TRAFFIC tagged revision "next" (PUBLIC)
        # --no-traffic --tag next: the new revision gets 0% traffic + a private preview URL
        # (next---outage-pricing-….run.app). The live URL is untouched until the promote
        # workflow flips traffic. MAPBOX_TOKEN is the server-side token the /api/geocode proxy
        # reads (never shipped to the client). GitHub masks it in logs.
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --platform managed \
            --region ${{ env.REGION }} \
            --no-iap \
            --allow-unauthenticated \
            --service-account project-service-account@modeling-nonprod-svc-db5x.iam.gserviceaccount.com \
            --memory 1Gi \
            --cpu 1 \
            --port 8080 \
            --set-env-vars MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }},NEXT_PUBLIC_BASE_PATH=${{ env.BASE_PATH }} \
            --no-traffic \
            --tag next

      - name: Print preview (tagged) URL
        run: |
          echo "=== validate this preview URL before promoting traffic ==="
          gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} \
            --format='json(status.traffic)'
