name: Build and Deploy outage-pricing to Cloud Run

# Triggered on pushes to deploy/outage-pricing. Builds the Next.js dashboard (web/) and
# deploys it LIVE (100% traffic to the new revision; prior revisions retained for rollback).
# main stays non-deploying. The old python dashboard is archived by this replacement.

on:
  push:
    branches: [deploy/outage-pricing]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      SERVICE: outage-pricing
      REGION: us-central1
      AR_HOST: us-central1-docker.pkg.dev
      AR_PROJECT: modeling-nonprod-svc-db5x
      AR_REPO: infrasuremodelingdocker
      APP_PATH: web
      BASE_PATH: /dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'modeling-nonprod-svc-db5x'
          workload_identity_provider: 'projects/952205173464/locations/global/workloadIdentityPools/infrasure-gh-actions-pool/providers/github-repo-provider'
          service_account: 'gh-actions-deploy@modeling-nonprod-svc-db5x.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Build and push image (Next.js · Docker)
        # Dockerfile (not buildpacks): Turbopack's `next build` rejects the buildpack's
        # symlinked node_modules. NEXT_PUBLIC_BASE_PATH bakes the /dashboard basePath at build.
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_BASE_PATH=${{ env.BASE_PATH }} \
            -t "$IMAGE" \
            ${{ env.APP_PATH }}
          docker push "$IMAGE"

      - name: Deploy to Cloud Run (PUBLIC · live traffic)
        # Routes 100% traffic to the new revision — the GHA deploy SA has the artifact-registry
        # + run permissions a personal account lacks for a traffic flip, so deploy-to-live on
        # push is the working path. Validated as the "next" preview first. MAPBOX_TOKEN is the
        # server-side token the /api/geocode proxy reads (never shipped to the client; masked in
        # logs). Prior revisions are retained for rollback.
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --platform managed \
            --region ${{ env.REGION }} \
            --no-iap \
            --allow-unauthenticated \
            --service-account project-service-account@modeling-nonprod-svc-db5x.iam.gserviceaccount.com \
            --memory 1Gi \
            --cpu 1 \
            --port 8080 \
            --set-env-vars MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }},NEXT_PUBLIC_BASE_PATH=${{ env.BASE_PATH }} \
            --tag next

      - name: Print live URL
        run: |
          echo "=== live URL ==="
          gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} \
            --format='value(status.url)'
